# Example cron tasks configuration for claude-code-slack.
# Copy this file to workspace/cron.yaml and edit as needed.
#
# Each task has:
#   name:        Unique identifier for the task
#   schedule:    Cron expression (minute hour day month weekday)
#   description: Human-readable description shown in Slack
#   prompt:      The prompt to send to Claude Code

tasks:
  - name: morning-briefing
    schedule: "0 9 * * 1-5"
    description: "Morning briefing (weekdays at 9am)"
    prompt: >
      Give me a concise morning briefing: check for any uncommitted changes or
      open TODOs in the codebase, summarize the git log from the past 24 hours,
      and suggest the top 1-2 things to focus on today.

  - name: daily-dependency-check
    schedule: "0 10 * * 1"
    description: "Weekly dependency check (Mondays at 10am)"
    prompt: >
      Check for outdated dependencies across all projects in this monorepo.
      List any packages with newer versions available and flag any known
      security advisories. Keep the summary brief.
